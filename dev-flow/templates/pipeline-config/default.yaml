# =============================================================================
# dev-flow pipeline configuration (default template)
# =============================================================================
# Generated by: /dev-flow:init
# This file lives at: .claude/dev-flow/config.yaml
#
# Placeholders (replaced during init):
#   ${PROJECT_NAME}  - detected from package.json / go.mod / composer.json / etc.
#
# After generation, edit this file freely to match your project needs.
# =============================================================================

version: "1.0"

# ---------------------------------------------------------------------------
# Project metadata
# ---------------------------------------------------------------------------
project:
  name: "${PROJECT_NAME}"

  # Project archetype. Determines which pipeline stages are relevant.
  #   cli       - command-line tool
  #   web-api   - backend HTTP/gRPC API (no UI)
  #   web-app   - full-stack or frontend web application
  #   mobile    - iOS / Android / cross-platform mobile app
  #   library   - reusable library / SDK / package
  #   monorepo  - multiple packages in one repository
  type: "web-api"

  # Technology stack tags. Auto-detected from project files during init.
  # Examples: ["php", "symfony"], ["go"], ["react", "typescript"], ["flutter", "dart"]
  stack: []

  # Does the project use a relational or document database?
  has_db: false

  # Does the project support multiple languages / locales?
  has_i18n: false

  # Does the project maintain a shared design-system / component library?
  has_design_system: false

  # Path to the design system relative to project root (only when has_design_system is true)
  design_system_path: "design-system/"

# ---------------------------------------------------------------------------
# Agent configuration
# ---------------------------------------------------------------------------
# Each agent can override its default model and receive extra instructions
# that are appended to the agent's system prompt.
#
# Models (in descending capability / cost):
#   opus   - best reasoning, architecture decisions, complex reviews
#   sonnet - strong all-rounder, good for implementation and reviews
#   haiku  - fastest & cheapest, good for formatting, summaries, triage
# ---------------------------------------------------------------------------
agents:
  architect:
    model: "opus"
    # Extra instructions appended to the architect agent prompt.
    # Example: "Prefer hexagonal architecture. Always produce C4 diagrams."
    extra_instructions: ""

  ux-designer:
    model: "opus"
    # Example: "Follow Material Design 3 guidelines."
    extra_instructions: ""

  implementer:
    model: "sonnet"
    # Example: "Use repository pattern for data access."
    extra_instructions: ""

  security-reviewer:
    model: "sonnet"
    # Example: "All endpoints require JWT authentication."
    extra_instructions: ""

  acceptance-reviewer:
    model: "sonnet"
    # Example: "Enforce 80% code coverage minimum."
    extra_instructions: ""

  legal-reviewer:
    model: "sonnet"
    # Example: "Focus on medical device regulations for this project."
    extra_instructions: ""

  pm:
    model: "haiku"
    # Example: "Write ticket summaries in Polish."
    extra_instructions: ""

# ---------------------------------------------------------------------------
# Legal compliance configuration (optional)
# ---------------------------------------------------------------------------
# Uncomment and configure to enable legal-reviewer agent.
# Without this section, legal reviews are skipped entirely.
#
# legal:
#   jurisdictions: [PL, EU]
#   sectors: []           # e.g., [medical], [financial]
#   extras: []            # e.g., [ecommerce], [ai], [platform]
#   overrides: []
#     # - check: GDPR-02
#     #   status: ACKNOWLEDGED
#     #   reason: "Withdrawal requires account deletion — conscious decision."
#     #   decided_by: "team-lead"
#     #   decided_at: "2026-01-15"
