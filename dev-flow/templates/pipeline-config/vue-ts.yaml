# =============================================================================
# dev-flow pipeline configuration - Vue 3 + TypeScript
# =============================================================================
# Generated by: /dev-flow:init (template: vue-ts)
# This file lives at: .claude/pipeline/config.yaml
#
# Tailored for Vue 3 (Composition API) + TypeScript web applications.
# =============================================================================

version: "1.0"

# ---------------------------------------------------------------------------
# Project metadata
# ---------------------------------------------------------------------------
project:
  name: "${PROJECT_NAME}"
  type: "web-app"
  stack: ["vue", "typescript"]
  has_db: false                  # Frontend only; set true if using local DB (e.g. IndexedDB)
  has_i18n: false                # Set true if using vue-i18n
  has_design_system: true        # Shared component library assumed
  design_system_path: "design-system/"

# ---------------------------------------------------------------------------
# Agent configuration
# ---------------------------------------------------------------------------
agents:
  architect:
    model: "opus"
    extra_instructions: |
      Vue 3 architecture conventions:
      - Composition API exclusively; no Options API in new code.
      - State management: Pinia stores (one store per domain concern).
      - Routing: Vue Router 4 with typed route params.
      - TypeScript strict mode enabled (strict: true in tsconfig.json).
      - Feature-based folder structure: src/features/<feature>/{components,composables,stores,types}.
      - Shared composables in src/composables/, shared types in src/types/.
      - API layer: typed HTTP client (axios or ofetch) with request/response interceptors.

  ux-designer:
    model: "opus"
    extra_instructions: |
      Vue UX conventions:
      - Components in design-system/ are the single source of truth for UI primitives.
      - Use design tokens (CSS custom properties) from the design system.
      - Accessibility: WCAG 2.1 AA minimum; semantic HTML and ARIA attributes.
      - Loading states, error states, and empty states for every data-dependent view.
      - Responsive design: mobile-first approach.
      - Transitions: use Vue <Transition> and <TransitionGroup> for UI state changes.

  implementer:
    model: "sonnet"
    extra_instructions: |
      Vue 3 implementation rules:
      - TypeScript strict mode: no any, no non-null assertions without comment.
      - <script setup lang="ts"> for all Single File Components (SFCs).
      - Props defined with defineProps<T>(); emits with defineEmits<T>().
      - Composables for reusable logic; prefix with use* (e.g. useAuth, usePagination).
      - Reactivity: ref() for primitives, reactive() for objects; prefer ref() by default.
      - Computed properties for derived state; avoid watchers when computed suffices.
      - Pinia stores: define with defineStore() using setup syntax for full TypeScript support.
      - Tests: Vitest + Vue Test Utils; mount/shallowMount with typed wrappers.
      - Co-locate tests: Component.test.ts next to Component.vue.
      - CSS: scoped styles by default; CSS Modules or Tailwind for utility classes.

  security-reviewer:
    model: "sonnet"
    extra_instructions: |
      Vue-specific security focus:
      - No v-html without DOMPurify sanitization.
      - User-provided URLs validated before :href/:src binding.
      - API tokens stored in httpOnly cookies, not localStorage/sessionStorage.
      - CORS configuration reviewed for API calls.
      - Dependencies audited (npm audit) for known vulnerabilities.
      - Content Security Policy headers configured.
      - Route guards enforce authentication/authorization.

  acceptance-reviewer:
    model: "sonnet"
    extra_instructions: |
      Vue acceptance criteria:
      - Components tested with Vue Test Utils (mount + trigger events).
      - Composables tested independently with test utilities.
      - Pinia stores tested in isolation.
      - Accessibility tested with vitest-axe or similar.
      - No console.error or console.warn in test output.

  pm:
    model: "haiku"
    extra_instructions: ""

# ---------------------------------------------------------------------------
# Checks
# ---------------------------------------------------------------------------
# Standard checks
standard:
  - id: tests_pass
    name: "Tests pass"
    run: true
    command: "npx vitest run"
    # Alternative if using Jest:
    # command: "npm test -- --watchAll=false"

  - id: tests_quality
    name: "Test quality"
    run: true
    rules:
      - "No trivial assertions"
      - "Each test verifies user-visible behavior, not implementation details"
      - "Test names describe user scenarios"
      - "No skipped tests without justification"
      - "Uses Vue Test Utils queries and trigger() for user interaction"

  - id: no_hardcoded_secrets
    name: "No hardcoded secrets"
    run: true

  - id: lint_passes
    name: "Linter passes"
    run: true
    command: "npx eslint ."

  - id: type_check
    name: "TypeScript type check"
    run: true
    command: "npx vue-tsc --noEmit"

# Security checks
security:
  - id: owasp_top10
    name: "OWASP Top 10"
    run: true
    scope: ["xss", "broken_auth", "injection"]

  - id: input_validation
    name: "Input validation"
    run: true
    rules:
      - "Form inputs validated client-side (Zod, Valibot, VeeValidate, or native)"
      - "API responses validated/typed before use"
      - "File uploads restricted by type and size"

  - id: sensitive_data
    name: "Sensitive data handling"
    run: true
    rules:
      - "No secrets or API keys in client-side code"
      - "Auth tokens in httpOnly cookies, not localStorage"
      - "No PII in console.log or error tracking payloads"

  - id: vue_security
    name: "Vue-specific security"
    run: true
    rules:
      - "No v-html without DOMPurify sanitization"
      - "User URLs validated before :href/:src binding"
      - "npm audit shows no high/critical vulnerabilities"
      - "CSP headers configured (no unsafe-inline if possible)"
      - "Router guards enforce auth on protected routes"

# Optional checks
optional:
  - id: db_migrations
    name: "DB migrations"
    run: false
    rules:
      - "Each schema change has a migration"
      - "Migration has up and down"
      - "Down is reversible"

  - id: i18n
    name: "Internationalization"
    run: false                   # Enable if has_i18n is true
    rules:
      - "No hardcoded UI strings in <template>"
      - "All text wrapped in $t() or useI18n().t()"
      - "Translation keys present in all locale JSON/YAML files"
      - "Pluralization handled with vue-i18n plural syntax"

  - id: design_system_compliance
    name: "Design system compliance"
    run: true                    # Enabled by default for Vue projects
    rules:
      - "New UI primitives created in design-system/ first"
      - "Feature code imports from design-system, not re-implements"
      - "Consistent notification/alert/modal patterns"
      - "Design tokens (CSS custom properties) used for colors, spacing, typography"

  - id: scalability
    name: "Scalability"
    run: false
    rules:
      - "Bundle size monitored (no large dependencies without justification)"
      - "Route-level code splitting with defineAsyncComponent or dynamic import()"
      - "Images optimized and lazy-loaded (v-lazy or native loading='lazy')"

  - id: personas_compliance
    name: "Persona compliance"
    run: false
    rules:
      - "UX messages match defined personas"
      - "Tone of voice consistent with target persona"
      - "Microcopy reviewed for clarity and empathy"

  - id: accessibility
    name: "Accessibility (a11y)"
    run: true
    rules:
      - "All interactive elements keyboard accessible"
      - "Semantic HTML elements used (button, nav, main, etc.)"
      - "ARIA attributes correct and not redundant"
      - "Color contrast meets WCAG 2.1 AA (4.5:1 text, 3:1 large text)"
      - "Focus management on route changes and modal open/close"

pm_suggestions: []
