# =============================================================================
# dev-flow pipeline checks (default template)
# =============================================================================
# Generated by: /dev-flow:init
# This file lives at: .claude/pipeline/checks.yaml
#
# Checks are evaluated by the acceptance-reviewer and security-reviewer agents.
# Each check has:
#   id      - unique identifier (referenced in reports)
#   name    - human-readable label
#   run     - true/false - whether this check is active
#   command - (optional) shell command; exit 0 = pass, non-zero = fail
#   rules   - (optional) list of rules the reviewing agent enforces via reasoning
#   scope   - (optional) list of sub-categories for grouped checks
#
# Placeholders (replaced during init):
#   ${TEST_COMMAND}  - e.g. "npm test", "go test ./...", "php bin/phpunit"
#   ${LINT_COMMAND}  - e.g. "npx eslint .", "golangci-lint run"
# =============================================================================

version: "1.0"

# ---------------------------------------------------------------------------
# Standard checks - run on every pipeline execution
# ---------------------------------------------------------------------------
standard:
  - id: tests_pass
    name: "Tests pass"
    run: true
    command: "${TEST_COMMAND}"

  - id: tests_quality
    name: "Test quality"
    run: true
    rules:
      - "No trivial assertions (assertTrue(true) etc.)"
      - "Each test verifies specific behavior"
      - "Test names describe what they test"
      - "No skipped tests without justification"

  - id: no_hardcoded_secrets
    name: "No hardcoded secrets"
    run: true
    # Scans for API keys, passwords, tokens committed in source code.
    # Checks .env files are gitignored and not committed.

  - id: lint_passes
    name: "Linter passes"
    run: true
    command: "${LINT_COMMAND}"

# ---------------------------------------------------------------------------
# Security checks - evaluated by the security-reviewer agent
# ---------------------------------------------------------------------------
security:
  - id: owasp_top10
    name: "OWASP Top 10"
    run: true
    scope: ["xss", "sql_injection", "broken_auth", "ssrf", "injection"]

  - id: input_validation
    name: "Input validation"
    run: true
    rules:
      - "All user inputs sanitized"
      - "Rate limiting on endpoints"

  - id: sensitive_data
    name: "Sensitive data handling"
    run: true
    rules:
      - "Passwords hashed with bcrypt/argon2 + per-record salt"
      - "PII encrypted at rest"
      - "No sensitive data in logs"

# ---------------------------------------------------------------------------
# Optional checks - disabled by default, enable per-project as needed
# ---------------------------------------------------------------------------
optional:
  - id: db_migrations
    name: "DB migrations"
    run: false
    rules:
      - "Each schema change has a migration"
      - "Migration has up and down"
      - "Down is reversible"

  - id: i18n
    name: "Internationalization"
    run: false
    rules:
      - "No hardcoded UI strings"
      - "Translation keys in all locale files"

  - id: design_system_compliance
    name: "Design system compliance"
    run: false
    rules:
      - "New UI components first in design-system/"
      - "Code uses design-system components, not custom ones"
      - "Consistent notification/alert/modal patterns"

  - id: scalability
    name: "Scalability"
    run: false
    rules:
      - "No in-process memory cache (use Redis/Memcached)"
      - "No file-based sessions"
      - "Stateless API endpoints"

  - id: personas_compliance
    name: "Persona compliance"
    run: false
    rules:
      - "UX messages match defined personas"
      - "Tone of voice consistent with target persona"

# ---------------------------------------------------------------------------
# PM suggestions
# ---------------------------------------------------------------------------
# The PM agent can append items here during pipeline runs.
# These are non-blocking recommendations surfaced in the final report.
pm_suggestions: []
