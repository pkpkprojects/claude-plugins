# =============================================================================
# dev-flow pipeline configuration - Flutter / Dart
# =============================================================================
# Generated by: /dev-flow:init (template: flutter)
# This file lives at: .claude/dev-flow/config.yaml
#
# Tailored for Flutter mobile (iOS/Android) and web applications.
# =============================================================================

version: "1.0"

# ---------------------------------------------------------------------------
# Project metadata
# ---------------------------------------------------------------------------
project:
  name: "${PROJECT_NAME}"
  type: "mobile"                 # Change to "web-app" if Flutter Web only
  stack: ["flutter", "dart"]
  has_db: false                  # Set true if using sqflite, Drift, Hive, etc.
  has_i18n: false                # Set true if using flutter_localizations / intl
  has_design_system: true        # Shared widget library assumed
  design_system_path: "design-system/"

# ---------------------------------------------------------------------------
# Agent configuration
# ---------------------------------------------------------------------------
agents:
  architect:
    model: "opus"
    extra_instructions: |
      Flutter architecture conventions:
      - State management: BLoC/Cubit pattern with flutter_bloc package.
      - Repository pattern for data access (local + remote data sources).
      - Feature-based folder structure: lib/features/<feature>/{bloc,models,pages,widgets}.
      - Shared code in lib/core/ (theme, constants, utils, network).
      - Navigation: GoRouter with typed routes.
      - Dependency injection: get_it + injectable, or Riverpod if preferred.
      - Separate data models from domain entities; use freezed for immutable models.

  ux-designer:
    model: "opus"
    extra_instructions: |
      Flutter UX conventions:
      - Design system widgets live in design-system/ (or lib/core/widgets/).
      - Follow Material Design 3 or Cupertino guidelines depending on platform target.
      - Use theme extensions for custom design tokens (colors, text styles, spacing).
      - Every screen has loading, error, and empty states.
      - Animations: use built-in Flutter animations (AnimatedContainer, Hero, etc.).
      - Responsive: LayoutBuilder / MediaQuery for adaptive layouts.
      - Accessibility: Semantics widgets, sufficient contrast, large touch targets (48x48dp).

  implementer:
    model: "sonnet"
    extra_instructions: |
      Flutter implementation rules:
      - Dart analysis options: strict-casts, strict-raw-types, strict-inference enabled.
      - Prefer const constructors wherever possible.
      - Widgets: small, single-responsibility; extract when build() exceeds ~50 lines.
      - BLoC: one BLoC per feature; events are sealed classes, states are freezed.
      - Never put business logic in widgets; delegate to BLoC/Cubit or use cases.
      - Tests: widget tests with WidgetTester, bloc tests with blocTest().
      - Golden tests for critical UI components in design-system/.
      - Use extension methods for context-based helpers (context.theme, context.l10n).

  security-reviewer:
    model: "sonnet"
    extra_instructions: |
      Flutter/mobile-specific security focus:
      - Sensitive data stored in flutter_secure_storage, not SharedPreferences.
      - API keys: not hardcoded; use --dart-define or .env files excluded from VCS.
      - Network: certificate pinning for production API endpoints.
      - Auth tokens: stored securely; refreshed before expiration.
      - No sensitive data in logs (debugPrint, print statements removed in release).
      - Obfuscation enabled for release builds (--obfuscate --split-debug-info).
      - Platform permissions: request only what is needed; justify each permission.
      - Deep links validated and sanitized.

  acceptance-reviewer:
    model: "sonnet"
    extra_instructions: |
      Flutter acceptance criteria:
      - Widget tests for all interactive components.
      - BLoC tests cover all events and state transitions.
      - Golden tests for design-system widgets (pixel-perfect verification).
      - Integration tests for critical user flows (integration_test/).
      - No print() statements in production code (use logger).

  pm:
    model: "haiku"
    extra_instructions: ""

# ---------------------------------------------------------------------------
# Checks
# ---------------------------------------------------------------------------
# Standard checks
standard:
  - id: tests_pass
    name: "Tests pass"
    run: true
    command: "flutter test"

  - id: tests_quality
    name: "Test quality"
    run: true
    rules:
      - "No trivial assertions (expect(true, isTrue) etc.)"
      - "Widget tests use find.byType, find.text, find.byKey appropriately"
      - "BLoC tests cover all event-to-state transitions"
      - "Test names describe the behavior being verified"
      - "No skipped tests without justification"

  - id: no_hardcoded_secrets
    name: "No hardcoded secrets"
    run: true

  - id: lint_passes
    name: "Dart analyzer passes"
    run: true
    command: "flutter analyze"

# Security checks
security:
  - id: owasp_top10
    name: "OWASP Mobile Top 10"
    run: true
    scope: ["insecure_storage", "insecure_communication", "broken_auth", "injection"]

  - id: input_validation
    name: "Input validation"
    run: true
    rules:
      - "All form inputs validated (TextFormField validators)"
      - "API responses validated and typed before use"
      - "Deep link parameters validated and sanitized"

  - id: sensitive_data
    name: "Sensitive data handling"
    run: true
    rules:
      - "Credentials in flutter_secure_storage, not SharedPreferences"
      - "No PII in logs or analytics events"
      - "Biometric auth for sensitive operations where appropriate"

  - id: mobile_security
    name: "Mobile-specific security"
    run: true
    rules:
      - "Certificate pinning configured for production API endpoints"
      - "API keys not hardcoded (use --dart-define or env-based injection)"
      - "Release builds use --obfuscate --split-debug-info"
      - "Minimum platform permissions requested"
      - "No print()/debugPrint() in release code"
      - "Jailbreak/root detection considered for sensitive apps"

# Optional checks
optional:
  - id: db_migrations
    name: "DB migrations"
    run: false                   # Enable if using sqflite/Drift with schema versioning
    rules:
      - "Each schema change has a migration in the database helper"
      - "Migrations are versioned and tested"
      - "Downgrade path documented even if not implemented"

  - id: i18n
    name: "Internationalization"
    run: false                   # Enable if has_i18n is true
    rules:
      - "No hardcoded UI strings in widget build methods"
      - "All strings use AppLocalizations (flutter_localizations)"
      - "ARB files present for all supported locales"
      - "Pluralization and gender handled correctly"

  - id: design_system_compliance
    name: "Design system compliance"
    run: true                    # Enabled by default for Flutter projects
    rules:
      - "New UI primitives created in design-system/ first"
      - "Feature widgets import from design-system, not re-implement"
      - "Theme extensions used for custom design tokens"
      - "Consistent notification/snackbar/dialog patterns"
      - "Golden tests exist for design-system widgets"

  - id: scalability
    name: "Scalability"
    run: false
    rules:
      - "ListView.builder for long lists (not Column with children)"
      - "Images cached (CachedNetworkImage or similar)"
      - "Heavy computation offloaded to Isolates"
      - "Memory leaks checked (dispose controllers, close streams)"

  - id: personas_compliance
    name: "Persona compliance"
    run: false
    rules:
      - "UX messages match defined personas"
      - "Tone of voice consistent with target persona"
      - "Microcopy reviewed for clarity and empathy"

  - id: accessibility
    name: "Accessibility (a11y)"
    run: true
    rules:
      - "Semantics widgets used for screen readers"
      - "Touch targets at least 48x48 dp"
      - "Color contrast meets WCAG 2.1 AA"
      - "Text scales with system font size setting"
      - "Focus traversal order logical"

pm_suggestions: []
