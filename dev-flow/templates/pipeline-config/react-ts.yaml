# =============================================================================
# dev-flow pipeline configuration - React + TypeScript
# =============================================================================
# Generated by: /dev-flow:init (template: react-ts)
# This file lives at: .claude/pipeline/config.yaml
#
# Tailored for React 18+ / TypeScript web applications.
# =============================================================================

version: "1.0"

# ---------------------------------------------------------------------------
# Project metadata
# ---------------------------------------------------------------------------
project:
  name: "${PROJECT_NAME}"
  type: "web-app"
  stack: ["react", "typescript"]
  has_db: false                  # Frontend only; set true if using local DB (e.g. IndexedDB)
  has_i18n: false                # Set true if using react-intl, i18next, etc.
  has_design_system: true        # Shared component library assumed
  design_system_path: "design-system/"

# ---------------------------------------------------------------------------
# Agent configuration
# ---------------------------------------------------------------------------
agents:
  architect:
    model: "opus"
    extra_instructions: |
      React architecture conventions:
      - Functional components only; no class components.
      - State management: React Context for simple state, Zustand/Redux Toolkit for complex.
      - Data fetching: TanStack Query (React Query) with typed hooks.
      - Routing: React Router v6+ with typed route params.
      - TypeScript strict mode enabled (strict: true in tsconfig.json).
      - Feature-based folder structure: src/features/<feature>/{components,hooks,api,types}.

  ux-designer:
    model: "opus"
    extra_instructions: |
      React UX conventions:
      - Components in design-system/ are the single source of truth for UI primitives.
      - Use design tokens (colors, spacing, typography) from the design system.
      - Accessibility: WCAG 2.1 AA minimum; use semantic HTML and ARIA attributes.
      - Loading states, error states, and empty states for every data-dependent view.
      - Responsive design: mobile-first approach.
      - Animations via CSS transitions or Framer Motion; avoid layout thrashing.

  implementer:
    model: "sonnet"
    extra_instructions: |
      React implementation rules:
      - TypeScript strict mode: no any, no non-null assertions without comment.
      - Functional components with explicit prop types (interface, not type alias for props).
      - Custom hooks for reusable logic; prefix with use*.
      - Effects: minimize useEffect; prefer derived state and event handlers.
      - Memoization: useMemo/useCallback only when profiling shows need.
      - Tests: React Testing Library (user-centric queries), not Enzyme.
      - Co-locate tests: Component.test.tsx next to Component.tsx.
      - CSS: CSS Modules, Tailwind, or styled-components (match existing project style).

  security-reviewer:
    model: "sonnet"
    extra_instructions: |
      React-specific security focus:
      - No dangerouslySetInnerHTML unless sanitized with DOMPurify.
      - User-provided URLs validated before rendering in href/src attributes.
      - API tokens stored in httpOnly cookies, not localStorage/sessionStorage.
      - CORS configuration reviewed for API calls.
      - Dependencies audited (npm audit) for known vulnerabilities.
      - Content Security Policy headers configured.

  acceptance-reviewer:
    model: "sonnet"
    extra_instructions: |
      React acceptance criteria:
      - Components tested with React Testing Library (render + user events).
      - Hooks tested with renderHook.
      - Accessibility tested with jest-axe or similar.
      - No console.error or console.warn in test output.

  pm:
    model: "haiku"
    extra_instructions: ""

# ---------------------------------------------------------------------------
# Checks
# ---------------------------------------------------------------------------
# Standard checks
standard:
  - id: tests_pass
    name: "Tests pass"
    run: true
    command: "npm test -- --watchAll=false"
    # Alternative if using Vitest:
    # command: "npx vitest run"

  - id: tests_quality
    name: "Test quality"
    run: true
    rules:
      - "No trivial assertions"
      - "Each test verifies user-visible behavior, not implementation details"
      - "Test names describe user scenarios"
      - "No skipped tests without justification"
      - "Uses Testing Library queries (getByRole, getByText), not getByTestId as first choice"

  - id: no_hardcoded_secrets
    name: "No hardcoded secrets"
    run: true

  - id: lint_passes
    name: "Linter passes"
    run: true
    command: "npx eslint ."

  - id: type_check
    name: "TypeScript type check"
    run: true
    command: "npx tsc --noEmit"

# Security checks
security:
  - id: owasp_top10
    name: "OWASP Top 10"
    run: true
    scope: ["xss", "broken_auth", "injection"]

  - id: input_validation
    name: "Input validation"
    run: true
    rules:
      - "Form inputs validated client-side (Zod, Yup, or native validation)"
      - "API responses validated/typed before use"
      - "File uploads restricted by type and size"

  - id: sensitive_data
    name: "Sensitive data handling"
    run: true
    rules:
      - "No secrets or API keys in client-side code"
      - "Auth tokens in httpOnly cookies, not localStorage"
      - "No PII in console.log or error tracking payloads"

  - id: react_security
    name: "React-specific security"
    run: true
    rules:
      - "No dangerouslySetInnerHTML without DOMPurify sanitization"
      - "User URLs validated before href/src rendering"
      - "npm audit shows no high/critical vulnerabilities"
      - "CSP headers configured (no unsafe-inline if possible)"

# Optional checks
optional:
  - id: db_migrations
    name: "DB migrations"
    run: false
    rules:
      - "Each schema change has a migration"
      - "Migration has up and down"
      - "Down is reversible"

  - id: i18n
    name: "Internationalization"
    run: false                   # Enable if has_i18n is true
    rules:
      - "No hardcoded UI strings in JSX"
      - "All text wrapped in t() or <FormattedMessage>"
      - "Translation keys present in all locale JSON files"
      - "Pluralization handled correctly"

  - id: design_system_compliance
    name: "Design system compliance"
    run: true                    # Enabled by default for React projects
    rules:
      - "New UI primitives created in design-system/ first"
      - "Feature code imports from design-system, not re-implements"
      - "Consistent notification/alert/modal patterns"
      - "Design tokens used for colors, spacing, typography (no magic values)"

  - id: scalability
    name: "Scalability"
    run: false
    rules:
      - "Bundle size monitored (no large dependencies without justification)"
      - "Code splitting with React.lazy for route-level components"
      - "Images optimized and lazy-loaded"

  - id: personas_compliance
    name: "Persona compliance"
    run: false
    rules:
      - "UX messages match defined personas"
      - "Tone of voice consistent with target persona"
      - "Microcopy reviewed for clarity and empathy"

  - id: accessibility
    name: "Accessibility (a11y)"
    run: true
    rules:
      - "All interactive elements keyboard accessible"
      - "Semantic HTML elements used (button, nav, main, etc.)"
      - "ARIA attributes correct and not redundant"
      - "Color contrast meets WCAG 2.1 AA (4.5:1 text, 3:1 large text)"
      - "Focus management on route changes and modal open/close"

pm_suggestions: []
