# =============================================================================
# dev-flow pipeline configuration - Symfony / PHP
# =============================================================================
# Generated by: /dev-flow:init (template: symfony-php)
# This file lives at: .claude/dev-flow/config.yaml
#
# Tailored for Symfony 6/7 + PHP 8.x projects with Doctrine ORM.
# =============================================================================

version: "1.0"

# ---------------------------------------------------------------------------
# Project metadata
# ---------------------------------------------------------------------------
project:
  name: "${PROJECT_NAME}"
  type: "web-api"                # Change to "web-app" if Twig/frontend is included
  stack: ["php", "symfony"]
  has_db: true                   # Doctrine ORM assumed
  has_i18n: false                # Set true if using Symfony Translations
  has_design_system: false       # Set true if Twig component library exists
  design_system_path: "design-system/"

# ---------------------------------------------------------------------------
# Agent configuration
# ---------------------------------------------------------------------------
agents:
  architect:
    model: "opus"
    extra_instructions: |
      Symfony conventions:
      - Services are autowired and autoconfigured via services.yaml.
      - Use constructor injection; avoid container->get().
      - Entities live in src/Entity/, repositories in src/Repository/.
      - Use Symfony Messenger for async operations.
      - Follow ADR (Action-Domain-Responder) or hexagonal architecture where appropriate.
      - Database access goes through repositories, never raw SQL in controllers.

  ux-designer:
    model: "opus"
    extra_instructions: |
      Symfony frontend conventions:
      - Twig templates live in templates/ following controller naming.
      - Use Twig components and Stimulus controllers for interactivity.
      - Forms are built with Symfony Form component, rendered via form themes.
      - Assets managed by AssetMapper or Webpack Encore.

  implementer:
    model: "sonnet"
    extra_instructions: |
      Symfony implementation rules:
      - PHP 8.3+ with strict_types=1 in every file.
      - Use PHP attributes for routes (#[Route]), ORM (#[ORM\Entity]), and validation (#[Assert\...]).
      - DTOs for request/response payloads; entities are not exposed directly.
      - Repository methods return typed collections or null, never raw arrays.
      - Use Symfony HttpKernel exceptions (NotFoundHttpException, etc.) for error responses.
      - Prefer value objects for domain concepts (Money, Email, etc.).
      - Services are final by default.

  security-reviewer:
    model: "sonnet"
    extra_instructions: |
      Symfony-specific security focus:
      - Verify CSRF tokens on all state-changing forms (CsrfTokenManager).
      - Twig autoescape must remain ON; verify |raw usage is justified.
      - Doctrine parameter binding used exclusively (no string concatenation in DQL/SQL).
      - Voters used for authorization logic, not inline role checks.
      - Sensitive routes protected by #[IsGranted] or security.yaml access_control.
      - Check firewall configuration covers all routes.
      - Verify secrets are in .env.local (not .env) and vault in production.

  acceptance-reviewer:
    model: "sonnet"
    extra_instructions: |
      Symfony acceptance criteria:
      - Functional tests use WebTestCase with the Symfony test client.
      - Database tests use isolated transactions (DAMADoctrineTestBundle or similar).
      - API tests verify JSON schema, status codes, and error responses.
      - Console commands have integration tests.

  legal-reviewer:
    model: "sonnet"
    extra_instructions: ""

  pm:
    model: "haiku"
    extra_instructions: ""

# Legal compliance configuration (optional)
# legal:
#   jurisdictions: [PL, EU]
#   sectors: []
#   extras: [ecommerce]
#   overrides: []

# ---------------------------------------------------------------------------
# Checks
# ---------------------------------------------------------------------------
# Standard checks
standard:
  - id: tests_pass
    name: "Tests pass"
    run: true
    command: "php bin/phpunit"

  - id: tests_quality
    name: "Test quality"
    run: true
    rules:
      - "No trivial assertions (assertTrue(true) etc.)"
      - "Each test verifies specific behavior"
      - "Test names describe what they test"
      - "No skipped tests without justification"
      - "WebTestCase used for controller tests, not unit mocks"

  - id: no_hardcoded_secrets
    name: "No hardcoded secrets"
    run: true

  - id: lint_passes
    name: "Linter / static analysis passes"
    run: true
    command: "php vendor/bin/phpstan analyse -l 6 src/"

# Security checks
security:
  - id: owasp_top10
    name: "OWASP Top 10"
    run: true
    scope: ["xss", "sql_injection", "broken_auth", "ssrf", "injection"]

  - id: input_validation
    name: "Input validation"
    run: true
    rules:
      - "All user inputs validated via Symfony Validator constraints"
      - "Form types define allowed fields explicitly (no extra_fields)"
      - "Rate limiting on authentication and public endpoints (RateLimiter component)"

  - id: sensitive_data
    name: "Sensitive data handling"
    run: true
    rules:
      - "Passwords hashed with password_hashers (bcrypt/argon2id) in security.yaml"
      - "PII encrypted at rest via Doctrine lifecycle listeners or value objects"
      - "No sensitive data in logs (Monolog processors scrub PII)"

  - id: symfony_security
    name: "Symfony-specific security"
    run: true
    rules:
      - "CSRF protection enabled on all state-changing forms"
      - "Twig autoescape ON globally; |raw usage justified in comments"
      - "Doctrine parameter binding only (no string interpolation in DQL/SQL)"
      - "Voters used for complex authorization, not inline role checks"
      - "Secrets stored in Symfony vault or .env.local, never .env"

# Optional checks
optional:
  - id: db_migrations
    name: "Doctrine migrations"
    run: true                    # Enabled by default for Symfony projects
    rules:
      - "Each schema change has a Doctrine migration (doctrine:migrations:diff)"
      - "Migration has up() and down() methods"
      - "down() is reversible and tested"
      - "No raw SQL in migrations unless Doctrine DBAL cannot express it"

  - id: i18n
    name: "Internationalization"
    run: false
    rules:
      - "No hardcoded UI strings in Twig templates"
      - "All strings use trans filter or Trans attribute"
      - "Translation keys present in all locale YAML files"

  - id: design_system_compliance
    name: "Design system compliance"
    run: false
    rules:
      - "New UI components first in design-system/"
      - "Twig templates use shared components, not one-off HTML"
      - "Consistent notification/alert/modal patterns"

  - id: scalability
    name: "Scalability"
    run: false
    rules:
      - "Cache via Symfony Cache component (Redis/Memcached adapter)"
      - "Sessions stored in Redis or database, not filesystem"
      - "Stateless API endpoints (no server-side sessions for API)"
      - "Heavy work dispatched to Messenger queue"

  - id: personas_compliance
    name: "Persona compliance"
    run: false
    rules:
      - "UX messages match defined personas"
      - "Tone of voice consistent with target persona"

pm_suggestions: []
