# =============================================================================
# dev-flow pipeline configuration - Go API
# =============================================================================
# Generated by: /dev-flow:init (template: go-api)
# This file lives at: .claude/dev-flow/config.yaml
#
# Tailored for Go HTTP/gRPC API services.
# =============================================================================

version: "1.0"

# ---------------------------------------------------------------------------
# Project metadata
# ---------------------------------------------------------------------------
project:
  name: "${PROJECT_NAME}"
  type: "web-api"
  stack: ["go"]
  has_db: false                  # Set true if using database/sql, sqlx, GORM, etc.
  has_i18n: false
  has_design_system: false       # API-only project, no UI components
  design_system_path: ""

# ---------------------------------------------------------------------------
# Agent configuration
# ---------------------------------------------------------------------------
agents:
  architect:
    model: "opus"
    extra_instructions: |
      Go architecture conventions:
      - Prefer stdlib over third-party packages; justify every dependency.
      - Follow standard Go project layout: cmd/, internal/, pkg/ (if public API).
      - Use interfaces at consumer side, not producer side.
      - Dependency injection via constructors, not global variables.
      - Configuration via environment variables (12-factor); use envconfig or similar.
      - Errors are values: wrap with fmt.Errorf("context: %w", err).

  ux-designer:
    model: "opus"
    extra_instructions: |
      API-only project: focus on API ergonomics.
      - Clear, consistent endpoint naming (REST conventions or gRPC service definitions).
      - Meaningful HTTP status codes and error response bodies.
      - OpenAPI / Protobuf schema is the "design" artifact.

  implementer:
    model: "sonnet"
    extra_instructions: |
      Go implementation rules:
      - go fmt / goimports enforced; no manual formatting.
      - Use context.Context as the first parameter in functions that do I/O.
      - Table-driven tests with testify/assert and testify/require.
      - Use testify/mock or hand-written mocks; no runtime reflection mocking.
      - Errors: never ignore (must handle or explicitly _ discard with comment).
      - Goroutines: always have a shutdown path; use errgroup for fan-out.
      - Logging: structured (slog or zerolog), no fmt.Println in production code.

  security-reviewer:
    model: "sonnet"
    extra_instructions: |
      Go-specific security focus:
      - SQL: use parameterized queries (database/sql placeholders $1, ?); no string concat.
      - HTTP: validate Content-Type, set security headers (CORS, CSP if serving HTML).
      - Input: validate and sanitize all request body, query params, path params.
      - Secrets: never in code; read from env or secrets manager at startup.
      - TLS: enforce TLS for outbound HTTP calls; verify certificates.
      - Concurrency: check for race conditions (go test -race).

  acceptance-reviewer:
    model: "sonnet"
    extra_instructions: |
      Go acceptance criteria:
      - go test -race -count=1 ./... must pass.
      - Test coverage tracked; new code must include tests.
      - Integration tests use testcontainers-go or similar for external dependencies.
      - Benchmark tests for hot paths if applicable.

  legal-reviewer:
    model: "sonnet"
    extra_instructions: ""

  pm:
    model: "haiku"
    extra_instructions: ""

# Legal compliance configuration (optional)
# legal:
#   jurisdictions: [PL, EU]
#   sectors: []
#   extras: []
#   overrides: []

# ---------------------------------------------------------------------------
# Checks
# ---------------------------------------------------------------------------
# Standard checks
standard:
  - id: tests_pass
    name: "Tests pass"
    run: true
    command: "go test -race -count=1 ./..."

  - id: tests_quality
    name: "Test quality"
    run: true
    rules:
      - "No trivial assertions"
      - "Table-driven tests for multiple input variations"
      - "Test names follow Go convention: TestFunctionName_Scenario"
      - "No skipped tests without justification"

  - id: no_hardcoded_secrets
    name: "No hardcoded secrets"
    run: true

  - id: lint_passes
    name: "Linter passes"
    run: true
    command: "golangci-lint run"

# Security checks
security:
  - id: owasp_top10
    name: "OWASP Top 10"
    run: true
    scope: ["sql_injection", "broken_auth", "ssrf", "injection"]

  - id: input_validation
    name: "Input validation"
    run: true
    rules:
      - "All user inputs validated before processing"
      - "Request body size limited (http.MaxBytesReader)"
      - "Rate limiting on public endpoints"
      - "Path and query parameters validated and typed"

  - id: sensitive_data
    name: "Sensitive data handling"
    run: true
    rules:
      - "Passwords hashed with bcrypt or argon2"
      - "PII encrypted at rest"
      - "No sensitive data in structured log fields"
      - "Secrets loaded from environment, not config files"

  - id: go_security
    name: "Go-specific security"
    run: true
    rules:
      - "database/sql parameterized queries only (no string concatenation)"
      - "HTTP clients have timeouts set"
      - "TLS certificate verification not disabled"
      - "No unsafe package usage without justification"
      - "go test -race passes (no data races)"

# Optional checks
optional:
  - id: db_migrations
    name: "DB migrations"
    run: false                   # Enable if using database
    rules:
      - "Each schema change has a migration file"
      - "Migration has up and down (golang-migrate or goose)"
      - "Down is reversible"

  - id: i18n
    name: "Internationalization"
    run: false
    rules:
      - "Error messages use message catalogs, not hardcoded strings"
      - "Locale-aware formatting for dates and numbers"

  - id: scalability
    name: "Scalability"
    run: false
    rules:
      - "No in-process memory cache (use Redis/Memcached)"
      - "Stateless HTTP handlers (no server-side sessions)"
      - "Graceful shutdown with signal handling"
      - "Health and readiness endpoints for orchestrators"

  - id: design_system_compliance
    name: "Design system compliance"
    run: false                   # Not applicable for API-only projects

  - id: personas_compliance
    name: "Persona compliance"
    run: false
    rules:
      - "API error messages are developer-friendly and actionable"

pm_suggestions: []
